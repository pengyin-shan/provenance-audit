# Release pipeline: on a version tag, build the package, checksum it,
# generate an SPDX SBOM and SLSA provenance, and attach everything to the
# GitHub release. Release notes are read from
# .github/RELEASE_NOTES_<tag>.md, which must exist for the tag being pushed.
name: release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Generate SHA256SUMS and provenance subjects
        id: hash
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          echo "hashes=$(sha256sum *.tar.gz *.whl | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build, sbom]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/RELEASE_NOTES_${{ github.ref_name }}.md
          files: |
            dist/*
            sbom.spdx.json

  # SLSA v1.0 Build L3 provenance; the generator uploads the .intoto.jsonl
  # attestation to the release created by the job above.
  provenance:
    needs: [build, release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
